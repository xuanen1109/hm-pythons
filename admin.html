<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — hm.pythons</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --brown: #3B1A10; --copper: #B5733A; --copper-light: #D4A06A;
  --copper-pale: #EDD4A8; --cream: #F5EFE4; --muted: #7A6A5A; --red: #8B0000;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); font-family:'Noto Sans TC',sans-serif; color:var(--brown); }

/* 登入介面 */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #F2F4F6 0%, #DDD8D0 100%);
}
.login-box {
  background:white; border:1px solid rgba(181,115,58,0.2);
  border-radius:12px; padding:48px; text-align:center; width:360px;
  box-shadow:0 8px 32px rgba(59,26,16,0.1);
}
.login-title { font-family:'Playfair Display',serif; font-size:24px; margin-bottom:32px; }
.google-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; border:1px solid rgba(59,26,16,0.2);
  border-radius:6px; background:white; cursor:pointer; font-weight:500;
}
.access-denied { color:var(--red); font-size:13px; margin-top:12px; display:none; }

/* 管理介面主架構 */
#admin-ui { display:none; }
.navbar {
  background:var(--brown); color:white; display:flex; align-items:center; 
  justify-content:space-between; padding:0 40px; height:60px; position:sticky; top:0; z-index:100;
}
.main { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 60px); }
.sidebar { background:white; border-right:1px solid rgba(181,115,58,0.12); padding:24px 0; }
.sidebar-btn {
  display:block; width:100%; padding:12px 24px; background:none; border:none;
  text-align:left; cursor:pointer; font-size:14px; color:var(--brown);
}
.sidebar-btn.active { background:var(--cream); color:var(--copper); font-weight:700; border-left:4px solid var(--copper); }
.content { padding:40px; }
.page { display:none; }
.page.active { display:block; }

/* 列表樣式 */
.snake-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px; }
.snake-card { background:white; border-radius:8px; overflow:hidden; border:1px solid #eee; position:relative; }
.snake-card-img { width:100%; aspect-ratio:1/1; object-fit:cover; }
.snake-card-body { padding:15px; }
.tag { font-size:10px; background:#f0f0f0; padding:2px 6px; margin-right:4px; border-radius:3px; }

/* 表單樣式 */
.form-card { background:white; padding:30px; border-radius:8px; max-width:600px; }
.form-group { margin-bottom:15px; }
.form-label { display:block; font-size:13px; margin-bottom:5px; }
.form-input, .form-select { width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; }
.submit-btn { background:var(--brown); color:white; padding:12px; border:none; border-radius:4px; width:100%; cursor:pointer; margin-top:10px; }

/* 彈窗樣式 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-overlay.show { display:flex; }
.modal { background:white; padding:30px; border-radius:8px; width:350px; }

.toast { position:fixed; bottom:20px; right:20px; background:#333; color:white; padding:10px 20px; border-radius:5px; display:none; z-index:2000; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">hm.pythons 後台</div>
    <button class="google-btn" onclick="doLogin()">使用 Google 帳號登入</button>
    <div class="access-denied" id="access-denied">⚠️ 此帳號無管理員權限</div>
  </div>
</div>

<div id="admin-ui">
  <nav class="navbar">
    <div style="font-weight:700">hm.pythons Admin</div>
    <div>
      <span id="user-name" style="margin-right:15px; font-size:13px"></span>
      <button onclick="doLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:4px 8px; cursor:pointer">登出</button>
    </div>
  </nav>

  <div class="main">
    <div class="sidebar">
      <button class="sidebar-btn active" onclick="showPage('list', this)">所有個體</button>
      <button class="sidebar-btn" onclick="showPage('add', this)">新增個體</button>
      <button class="sidebar-btn" onclick="showPage('import', this)">試算表匯入</button>
    </div>
    <div class="content">
      <div id="page-list" class="page active">
        <h2 style="margin-bottom:20px">所有個體</h2>
        <div class="snake-grid" id="snake-grid">載入中...</div>
      </div>

      <div id="page-add" class="page">
        <h2>新增個體</h2>
        <div class="form-card">
          <div class="form-group">
            <label class="form-label">上傳照片</label>
            <input type="file" onchange="handleImageUpload(this)">
            <input type="hidden" id="f-img">
            <div id="up-status" style="font-size:12px; color:var(--copper)"></div>
          </div>
          <div class="form-group"><label class="form-label">編號</label><input class="form-input" id="f-code"></div>
          <div class="form-group"><label class="form-label">名稱/品系</label><input class="form-input" id="f-name"></div>
          <div class="form-group">
            <label class="form-label">狀態</label>
            <select class="form-select" id="f-status">
              <option value="sale">待售中</option>
              <option value="auction">競標中</option>
              <option value="sold">已售出</option>
            </select>
          </div>
          <button class="submit-btn" onclick="submitSnake()">儲存新增</button>
        </div>
      </div>

      <div id="page-import" class="page">
        <h2>試算表匯入</h2>
        <button class="submit-btn" style="max-width:200px" onclick="previewImport()">開始抓取資料</button>
        <div id="import-preview" style="margin-top:20px"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>修改狀態</h3>
    <select id="new-status" class="form-select" style="margin:20px 0">
      <option value="sale">待售中</option>
      <option value="auction">競標中</option>
      <option value="sold">已售出</option>
    </select>
    <button class="submit-btn" onclick="saveStatus()">儲存</button>
    <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:10px; cursor:pointer">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "
