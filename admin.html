<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — hm.pythons</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --brown: #3B1A10; --copper: #B5733A; --copper-light: #D4A06A;
  --copper-pale: #EDD4A8; --cream: #F5EFE4; --muted: #7A6A5A; --red: #8B0000;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); font-family:'Noto Sans TC',sans-serif; color:var(--brown); }

/* 登入畫面 */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #F2F4F6 0%, #DDD8D0 100%);
}
.login-box {
  background:white; border:1px solid rgba(181,115,58,0.2);
  border-radius:12px; padding:48px; text-align:center; width:360px;
  box-shadow:0 8px 32px rgba(59,26,16,0.1);
}
.login-title { font-family:'Playfair Display',serif; font-size:24px; color:var(--brown); margin-bottom:32px; }
.google-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; border:1px solid rgba(59,26,16,0.2);
  border-radius:6px; background:white; cursor:pointer; font-size:14px; font-weight:500;
}
.access-denied { color:var(--red); font-size:13px; margin-top:12px; display:none; }

/* 主介面 */
#admin-ui { display:none; }
.navbar {
  background:var(--brown); color:white; display:flex; align-items:center; 
  justify-content:space-between; padding:0 40px; height:60px; position:sticky; top:0; z-index:100;
}
.main { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 60px); }
.sidebar { background:white; border-right:1px solid rgba(181,115,58,0.12); padding:24px 0; }
.sidebar-btn {
  display:block; width:100%; padding:12px 24px; background:none; border:none;
  text-align:left; cursor:pointer; font-size:14px; color:var(--brown);
}
.sidebar-btn.active { background:var(--cream); color:var(--copper); font-weight:700; border-left:4px solid var(--copper); }
.content { padding:40px; }
.page { display:none; }
.page.active { display:block; }

/* 卡片佈局 */
.snake-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; }
.snake-card { background:white; border-radius:8px; overflow:hidden; border:1px solid rgba(181,115,58,0.1); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.snake-card-img { width:100%; aspect-ratio:1/1; object-fit:cover; background: #eee; }
.snake-card-body { padding:15px; }
.card-btns { display: flex; gap: 8px; margin-top: 12px; }
.btn-sm { flex: 1; padding: 6px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; }

.form-card { background:white; padding:32px; border-radius:8px; max-width:600px; border:1px solid rgba(181,115,58,0.1); }
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:13px; font-weight: 500; margin-bottom:8px; }
.form-input, .form-select { width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; }
.submit-btn { background:var(--brown); color:var(--copper-pale); padding:12px; border:none; border-radius:4px; width:100%; cursor:pointer; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-overlay.show { display:flex; }
.modal { background:white; padding:30px; border-radius:8px; width:350px; text-align:center; }

.toast { position:fixed; bottom:20px; right:20px; background:var(--brown); color:white; padding:12px 24px; border-radius:6px; display:none; z-index:2000; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">hm.pythons 後台</div>
    <button class="google-btn" id="btn-login-trigger">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
      使用 Google 帳號登入
    </button>
    <div class="access-denied" id="access-denied">⚠️ 此帳號無管理員權限</div>
  </div>
</div>

<div id="admin-ui">
  <nav class="navbar">
    <div style="font-weight:700">hm.pythons Admin</div>
    <div>
      <span id="user-name" style="margin-right:15px; font-size:12px"></span>
      <button id="btn-logout" style="background:none; border:1px solid #fff; color:#fff; padding:4px
